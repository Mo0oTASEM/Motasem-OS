name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  CI: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc -b
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-dist
          path: dist/

  backend:
    name: Backend
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: server/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx tsc -b
      - run: npm test
      - run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: server/
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t motasem-os-api:ci .
